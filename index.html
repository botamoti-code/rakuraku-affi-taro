<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="自動アフィリエイト投稿作成アプリ・文章作成キット">
    <title>楽々アフィ太郎</title>
    <!-- Google Fonts: 筆致のようなエレガントな明朝体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor"></div>
    <div class="container">
        <header>
            <h1>楽々アフィ太郎</h1>
            <p class="subtitle">あなただけの魅力を引き出す、SNS自動文章作成キット</p>
        </header>

        <section class="card form-section">
            <div class="profile-status">
                <i class="fa-solid fa-user-check"></i> <span id="loginMessage">情報が入力されていません</span>
                <button type="button" id="clearProfileBtn" class="small-btn hidden">プロフィールをリセット</button>
            </div>
            <p class="notice"><i class="fa-solid fa-circle-info"></i> 入力内容はブラウザに自動保存され、次回からはサクサク入力できます！</p>
            
            <form id="affiForm">
                
                <h2 class="section-title"><i class="fa-solid fa-1"></i> あなたの商品のこと</h2>
                <div class="form-group">
                    <label for="product">今回売りたい商品やサービス</label>
                    <input type="text" id="product" placeholder="例: スマホ起業の講座" required>
                </div>

                <div class="form-group">
                    <label for="affiliateLink">アフィリエイトリンク（省略可）</label>
                    <input type="url" id="affiliateLink" placeholder="例: https://...">
                </div>
                
                <div class="form-group">
                    <label for="otherInfo">あなたの付加価値（独自サポート・特典）</label>
                    <p class="hint">私経由なら何がついてくる？</p>
                    <textarea id="otherInfo" rows="2" placeholder="例: 私経由で参加された方には初期設定サポートをお付けします。" required></textarea>
                </div>

                <hr class="divider">

                <h2 class="section-title"><i class="fa-solid fa-2"></i> あなたのストーリー（3ステップ）</h2>
                <p class="hint">迷ったら「例文」ボタンを押してアレンジしてください。</p>

                <div class="form-group episode-group">
                    <label for="beforeText">【Before】過去の悩みや生活</label>
                    <div class="quick-fills">
                        <button type="button" class="q-btn" onclick="insertExample('beforeText', 'money')">1.お金の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('beforeText', 'time')">2.時間の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('beforeText', 'family')">3.家族の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('beforeText', 'self')">4.自己評価</button>
                        <button type="button" class="q-btn" onclick="insertExample('beforeText', 'future')">5.将来の不安</button>
                    </div>
                    <textarea id="beforeText" rows="2" placeholder="過去の悩みを選択、または入力してください" required></textarea>
                </div>

                <div class="form-group episode-group">
                    <label for="triggerText">【きっかけ】どうやって学び始めた？</label>
                    <div class="quick-fills">
                        <button type="button" class="q-btn" onclick="insertExample('triggerText', 'money')">1.お金の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('triggerText', 'time')">2.時間の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('triggerText', 'family')">3.家族の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('triggerText', 'self')">4.自己評価</button>
                        <button type="button" class="q-btn" onclick="insertExample('triggerText', 'future')">5.将来の不安</button>
                    </div>
                    <textarea id="triggerText" rows="2" placeholder="きっかけを選択、または入力してください" required></textarea>
                </div>

                <div class="form-group episode-group">
                    <label for="afterText">【After】現在の変化や小さな成功体験</label>
                    <div class="quick-fills">
                        <button type="button" class="q-btn" onclick="insertExample('afterText', 'money')">1.お金の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('afterText', 'time')">2.時間の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('afterText', 'family')">3.家族の悩み</button>
                        <button type="button" class="q-btn" onclick="insertExample('afterText', 'self')">4.自己評価</button>
                        <button type="button" class="q-btn" onclick="insertExample('afterText', 'future')">5.将来の不安</button>
                    </div>
                    <textarea id="afterText" rows="2" placeholder="現在の変化を選択、または入力してください" required></textarea>
                </div>

                <button type="submit" class="submit-btn"><i class="fa-solid fa-wand-magic-sparkles"></i> スレッズ用文章を5つ生成する</button>
            </form>
        </section>

        <!-- 結果表示セクション（初期非表示） -->
        <section id="resultsSection" class="results-section hidden">
            <h2>✨ 完成したThreads投稿（5パターン）</h2>
            <p class="result-desc">以下のカードの「Threadsへ投稿」ボタンを押すだけで、文章が自動でセットされます！</p>
            
            <div id="postsContainer" class="posts-container">
                <!-- JSでここにカードが生成されます -->
            </div>
            
            <button id="resetBtn" class="reset-btn hidden"><i class="fa-solid fa-arrow-rotate-left"></i> もう一度作成する</button>
        </section>
    </div>

    <!-- テンプレート用：JSからコピーされるHTML構造 -->
    <template id="postTemplate">
        <div class="post-card fade-in">
            <h3 class="post-title"></h3>
            <p class="post-explanation"></p>
            <div class="post-content-container">
                <textarea class="post-content-readonly" readonly></textarea>
                <div class="action-buttons">
                    <button class="copy-btn" title="文章をコピー"><i class="fa-regular fa-copy"></i> コピーする</button>
                    <button class="threads-btn" title="Threadsを開く"><i class="fa-brands fa-threads"></i> Threadsへ投稿</button>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
